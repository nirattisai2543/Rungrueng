<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ทรัพย์รุ่งเรือง VIP นำโชค</title>
    <script src="https://cdn.jsdelivr.net/npm/interactjs/dist/interact.min.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Charmonman:wght@400;700&family=Sarabun:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { margin: 0; padding: 20px; background-color: #0b0b0b; font-family: 'Sarabun', sans-serif; color: white; min-height: 100vh; display: flex; flex-direction: column; align-items: center; font-size: 18px; }
        #page-menu, #page-main { width: 100%; max-width: 600px; }
        #page-main { display: none; text-align: center; }
        .button-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 10px; }
        .btn-action { padding: 10px 12px; font-size: 18px; font-weight: bold; border: none; border-radius: 10px; cursor: pointer; color: #fff; font-family: 'Sarabun', sans-serif; }
        .full-width { grid-column: span 2; }
        .nav-grid { display: grid; grid-template-columns: 1fr 2fr 1fr; gap: 8px; margin-bottom: 10px; }
        .search-input { width: 90%; padding: 10px 12px; margin: 0 auto 15px; display: block; border-radius: 25px; border: 1px solid #b8860b; background: #222; color: white; text-align: center; font-family: 'Sarabun', sans-serif; font-size: 18px; }
        .btn-folder { width: 100%; padding: 12px; background: #222; border: 2px solid #b8860b; color: #ffd700; border-radius: 12px; margin-bottom: 10px; cursor: pointer; font-size: 20px; font-weight: bold; font-family: 'Sarabun', sans-serif; }
        .lottery-list { display: none; flex-wrap: wrap; gap: 5px; justify-content: center; background: #1a1a1a; padding: 10px; border-radius: 10px; margin-bottom: 15px; }
        .lottery-list.active { display: flex; }
        .btn-lotto { padding: 8px 14px; background: #333; border: 1px solid #555; color: #fff; cursor: pointer; border-radius: 5px; font-size: 16px; display: flex; align-items: center; gap: 8px; font-family: 'Sarabun', sans-serif; }
        
        .container { position: relative; width: 100%; aspect-ratio: 1 / 1; background-image: url('21957.png'); background-size: cover; background-position: center; border-radius: 10px; margin: 0 auto; overflow: hidden; cursor: pointer; }
        
        .number-box, .lotto-number { position: absolute; font-weight: 700; text-align: center; font-family: 'Charmonman', cursive; touch-action: none; cursor: pointer; border: 2px solid transparent; white-space: nowrap; }
        
        #title { 
            font-weight: 700;
            color: #eedd82; 
            -webkit-text-stroke: 6px #5a1107;
            paint-order: stroke fill;
            filter: drop-shadow(2px 2px 3px rgba(0,0,0,0.5));
        }
        
        #date-display { color: #ffffff; font-weight: bold; text-shadow: 1px 1px 3px rgba(0,0,0,0.8); }

        .lotto-number { 
            color: #ffd24d; 
            font-weight: 700; 
            -webkit-text-stroke: 4px #ffffff;
            paint-order: stroke fill;
            stroke-linejoin: round;
            filter: drop-shadow(2px 2px 4px rgba(0, 0, 0, 0.7));
        }

        .single-digit {
            display: inline-block;
            transform-origin: center;
        }

        .date-control { background: #222; padding: 10px; border-radius: 10px; border: 1px solid #b8860b; display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        .date-label-style { font-size: 20px; font-weight: bold; font-family: 'Sarabun', sans-serif; }
        .size-control-panel { display: none; background: #222; padding: 12px; border-radius: 10px; border: 1px solid #ffd700; margin-bottom: 12px; text-align: center; }
        .size-slider { width: 80%; accent-color: #ffd700; cursor: pointer; margin-top: 5px; }
    </style>
</head>
<body>

<div id="page-menu">
    <h2 style="text-align:center; color:#ffd700; font-family: 'Sarabun', sans-serif; font-size: 28px; font-weight: bold;">เลือกหมวดหมู่หวย</h2>
    <input type="text" class="search-input" placeholder="🔍 ค้นหาชื่อหวย..." oninput="filterLottery(this.value)">
    <div id="menu"></div>
</div>

<div id="page-main">
    <div class="date-control">
        <button onclick="adjustDate(-1)" style="border:none; background:#b8860b; color:white; padding:6px 16px; border-radius:5px; cursor:pointer; font-family: 'Sarabun', sans-serif; font-size: 16px; font-weight: bold;">- วัน</button>
        <span id="date-label" class="date-label-style"></span>
        <button onclick="adjustDate(1)" style="border:none; background:#b8860b; color:white; padding:6px 16px; border-radius:5px; cursor:pointer; font-family: 'Sarabun', sans-serif; font-size: 16px; font-weight: bold;">+ วัน</button>
    </div>

    <div class="button-grid">
        <button class="btn-action full-width" style="background:linear-gradient(45deg, #b8860b, #ffd700); color:#000;" onclick="genNumbers()">สุ่มเลขนำโชค</button>
        <button class="btn-action full-width" style="background:linear-gradient(45deg, #28a745, #20c997);" onclick="exportForIOS()">📸 บันทึกรูป (iOS)</button>
        <button class="btn-action" id="lock-btn" onclick="toggleLock()">🔓 ปลดล็อค</button>
        <button class="btn-action" style="background:#cc0000;" onclick="resetAll()">🔄 รีเซ็ตทั้งหมด</button>
    </div>

    <div id="size-panel" class="size-control-panel">
        <div style="font-size: 16px; color: #ffd700;">📐 เลื่อนเพื่อย่อ-ขยายขนาดอักษรในรูป</div>
        <input type="range" id="fontSizeSlider" class="size-slider" min="50" max="150" value="100" oninput="changeFontSize(this.value)">
    </div>

    <div class="nav-grid">
        <button class="btn-action" style="background:#555;" onclick="moveLotto(-1)">◀ ก่อนหน้า</button>
        <button class="btn-action" style="background:#444;" onclick="showPage('page-menu')">เมนูหลัก</button>
        <button class="btn-action" style="background:#555;" onclick="moveLotto(1)">ถัดไป ▶</button>
    </div>
    
    <div class="container" id="capture" onclick="exportCanvas()">
        <div id="title" class="number-box" data-base-size="42" style="top:5%; left:33%; width:60%; font-size:42px;">หวย</div>
        <div id="date-display" class="number-box" data-base-size="22" style="top:16%; left:33%; width:60%; font-size:22px;"></div>
        
        <div id="o1" class="lotto-number single-digit" data-base-size="68" style="top:38%; left:30%; font-size:68px; width:60px;">.</div>
        <div id="o2" class="lotto-number single-digit" data-base-size="68" style="top:38%; left:55%; font-size:68px; width:60px;">.</div>

        <div id="n1" class="lotto-number" data-base-size="46" style="top:56%; left:15%; font-size:46px; width:80px;">..</div>
        <div id="n2" class="lotto-number" data-base-size="46" style="top:56%; left:35%; font-size:46px; width:80px;">..</div>
        <div id="n3" class="lotto-number" data-base-size="46" style="top:56%; left:55%; font-size:46px; width:80px;">..</div>
        <div id="n4" class="lotto-number" data-base-size="46" style="top:56%; left:75%; font-size:46px; width:80px;">..</div>

        <div id="m1" class="lotto-number" data-base-size="46" style="top:72%; left:20%; font-size:46px; width:100px;">...</div>
        <div id="m2" class="lotto-number" data-base-size="46" style="top:72%; left:45%; font-size:46px; width:100px;">...</div>
        <div id="m3" class="lotto-number" data-base-size="46" style="top:72%; left:70%; font-size:46px; width:100px;">...</div>
    </div>
</div>

<script>
    const db = {
        "หวย จันทร์-ศุกร์": [
            {n:"ลาว Extra", f:"la"}, {n:"นิเคอิเช้า VIP", f:"jp"}, {n:"นอยอาเซียน", f:"vn"}, {n:"นิเคอิเช้า", f:"jp"}, 
            {n:"จีนเช้า VIP", f:"cn"}, {n:"จีนเช้า", f:"cn"}, {n:"ลาว TV", f:"la"}, {n:"ฮั่งเส็งเช้า VIP", f:"hk"}, 
            {n:"ฮั่งเส็งเช้า", f:"hk"}, {n:"ฮานอย HD", f:"vn"}, {n:"ไต้หวัน VIP", f:"tw"}, {n:"ฮานอย STAR", f:"vn"}, 
            {n:"ไต้หวัน", f:"tw"}, {n:"เกาหลี VIP", f:"kr"}, {n:"เกาหลี", f:"kr"}, {n:"นิเคอิบ่าย", f:"jp"}, 
            {n:"นิเคอิบ่าย VIP", f:"jp"}, {n:"ลาว HD", f:"la"}, {n:"จีนบ่าย", f:"cn"}, {n:"ฮานอย TV", f:"vn"}, 
            {n:"จีนบ่าย VIP", f:"cn"}, {n:"ฮั่งเส็งบ่าย", f:"hk"}, {n:"ฮั่งเส็งบ่าย VIP", f:"hk"}, {n:"ลาวสตาร์", f:"la"}, 
            {n:"สิงคโปร์", f:"sg"}, {n:"ไทยเย็น", f:"th"}, {n:"ฮานอยกาชาด", f:"vn"}, {n:"อินเดีย", f:"in"}, 
            {n:"สิงคโปร์ VIP", f:"sg"}, {n:"อียิปต์", f:"eg"}, {n:"ฮานอยพิเศษ", f:"vn"}, {n:"ฮานอยสามัคคี", f:"vn"}, 
            {n:"ฮานอยปกติ", f:"vn"}, {n:"ฮานอย VIP", f:"vn"}, {n:"ฮานอยพัฒนา", f:"vn"}, {n:"ลาวพัฒนา", f:"la"}, 
            {n:"ลาวสามัคคี", f:"la"}, {n:"ลาวอาเซียน", f:"la"}, {n:"ลาว VIP", f:"la"}, {n:"ลาวสามัคคี VIP", f:"la"}, 
            {n:"อังกฤษ VIP", f:"gb"}, {n:"ลาวสตาร์ VIP", f:"la"}, {n:"ฮานอย Extra", f:"vn"}, {n:"อังกฤษ", f:"gb"}, 
            {n:"เยอรมัน", f:"de"}, {n:"รัสเซีย", f:"ru"}, {n:"เยอรมัน VIP", f:"de"}, {n:"ลาวกาชาด", f:"la"}, 
            {n:"รัสเซีย VIP", f:"ru"}, {n:"ดาวโจนส์ VIP", f:"us"}, {n:"ดาวโจนส์", f:"us"}, {n:"ดาวโจนส์ STAR", f:"us"}
        ],
        "หวย เสาร์-อาทิตย์": [
            {n:"ลาว Extra", f:"la"}, {n:"นิเคอิเช้า VIP", f:"jp"}, {n:"นอยอาเซียน", f:"vn"}, {n:"จีนเช้า VIP", f:"cn"}, 
            {n:"ลาว TV", f:"la"}, {n:"ฮั่งเส็งเช้า VIP", f:"hk"}, {n:"ฮานอย HD", f:"vn"}, {n:"ไต้หวัน VIP", f:"tw"}, 
            {n:"ฮานอย STAR", f:"vn"}, {n:"เกาหลี VIP", f:"kr"}, {n:"นิเคอิบ่าย VIP", f:"jp"}, {n:"ลาว HD", f:"la"}, 
            {n:"ฮานอย TV", f:"vn"}, {n:"จีนบ่าย VIP", f:"cn"}, {n:"ฮั่งเส็งบ่าย VIP", f:"hk"}, {n:"ลาวสตาร์", f:"la"}, 
            {n:"ฮานอยกาชาด", f:"vn"}, {n:"สิงคโปร์ VIP", f:"sg"}, {n:"ฮานอยพิเศษ", f:"vn"}, {n:"ฮานอยสามัคคี", f:"vn"}, 
            {n:"ฮานอยปกติ", f:"vn"}, {n:"ฮานอย VIP", f:"vn"}, {n:"ฮานอยพัฒนา", f:"vn"}, {n:"ลาวสามัคคี", f:"la"}, 
            {n:"ลาวอาเซียน", f:"la"}, {n:"ลาว VIP", f:"la"}, {n:"ลาวสามัคคี VIP", f:"la"}, {n:"ลาวสตาร์ VIP", f:"la"}, 
            {n:"ฮานอย Extra", f:"vn"}, {n:"ดาวโจนส์ VIP", f:"us"}, {n:"ดาวโจนส์ STAR", f:"us"}, {n:"ดาวโจนส์", f:"us"}
        ],
        "หวยรัฐบาล": [{n:"รัฐบาลไทย", f:"th"}, {n:"ธ.ก.ส", f:"th"}, {n:"ออมสิน", f:"th"}]
    };

    let curF = "หวย จันทร์-ศุกร์", curI = 0, isLocked = false, curDate = new Date(), currentScale = 100;

    function changeFontSize(scalePercent) {
        currentScale = parseInt(scalePercent);
        document.querySelectorAll('.number-box, .lotto-number').forEach(box => {
            const baseSize = parseFloat(box.getAttribute('data-base-size'));
            if (baseSize) box.style.fontSize = `${(baseSize * currentScale) / 100}px`;
        });
        save();
    }

    function drawCanvasAndExport(callback) {
        const c = document.createElement('canvas'), ctx = c.getContext('2d'), img = new Image(); 
        img.src = '21957.png'; 
        img.onload = () => { 
            c.width = img.width; c.height = img.height; ctx.drawImage(img, 0, 0, c.width, c.height); 
            const container = document.getElementById('capture'); 
            
            ctx.lineJoin = 'round';
            ctx.lineCap = 'round';

            document.querySelectorAll('.number-box').forEach(box => { 
                const s = window.getComputedStyle(box), rect = box.getBoundingClientRect(), cont = container.getBoundingClientRect(); 
                const centerX = (rect.left - cont.left + rect.width / 2) / container.offsetWidth; 
                const centerY = (rect.top - cont.top + rect.height / 2) / container.offsetHeight; 
                const fSize = parseFloat(s.fontSize) * (c.width / container.offsetWidth);

                ctx.textAlign = 'center'; ctx.textBaseline = 'middle'; 
                ctx.font = `bold ${fSize}px 'Charmonman'`;
                
                if (box.id === 'title') {
                    ctx.strokeStyle = '#5a1107';
                    ctx.lineWidth = fSize * 0.14; 
                    ctx.strokeText(box.textContent, centerX * c.width, centerY * c.height);
                    ctx.fillStyle = '#eedd82';
                } else {
                    ctx.fillStyle = '#ffffff';
                    ctx.shadowColor = 'rgba(0,0,0,0.8)'; ctx.shadowBlur = 4; ctx.shadowOffsetX = 1; ctx.shadowOffsetY = 1;
                }
                ctx.fillText(box.textContent, centerX * c.width, centerY * c.height); 
                ctx.shadowBlur = 0; ctx.shadowOffsetX = 0; ctx.shadowOffsetY = 0;
            }); 

            document.querySelectorAll('.lotto-number').forEach(box => { 
                const s = window.getComputedStyle(box), rect = box.getBoundingClientRect(), cont = container.getBoundingClientRect(); 
                const centerX = (rect.left - cont.left + rect.width / 2) / container.offsetWidth; 
                const centerY = (rect.top - cont.top + rect.height / 2) / container.offsetHeight; 
                const fSize = parseFloat(s.fontSize) * (c.width / container.offsetWidth);
                
                ctx.font = `bold ${fSize}px 'Charmonman'`; 
                ctx.textAlign = 'center'; ctx.textBaseline = 'middle'; 
                
                ctx.shadowColor = 'rgba(0,0,0,0.7)'; ctx.shadowBlur = 6; ctx.shadowOffsetX = 2; ctx.shadowOffsetY = 2;
                
                ctx.strokeStyle = '#ffffff';
                ctx.lineWidth = fSize * 0.10; 
                ctx.strokeText(box.textContent, centerX * c.width, centerY * c.height);
                
                ctx.shadowColor = 'transparent'; ctx.shadowBlur = 0; ctx.shadowOffsetX = 0; ctx.shadowOffsetY = 0;
                ctx.fillStyle = '#ffd24d'; 
                ctx.fillText(box.textContent, centerX * c.width, centerY * c.height); 
            }); 
            
            callback(c.toDataURL("image/png"));
        };
    }

    function exportCanvas() { drawCanvasAndExport((dataURL) => { const l = document.createElement('a'); l.download = 'Lotto_' + Date.now() + '.png'; l.href = dataURL; l.click(); }); }
    function exportForIOS() {
        drawCanvasAndExport((dataURL) => {
            const tempPage = document.createElement('div');
            tempPage.id = 'temp-ios-page';
            tempPage.style = "position:fixed; top:0; left:0; width:100%; height:100%; z-index:9999; text-align:center; padding:20px; color:white; background:#0b0b0b; overflow-y:auto; font-family:'Sarabun', sans-serif;";
            tempPage.innerHTML = `<h3 style="color:#ffd700; font-size:24px; font-weight:bold; margin-bottom:15px;">กดค้างที่รูป > บันทึกไปยังรูปภาพ</h3><img src="${dataURL}" style="width:100%; max-width:500px; border:2px solid #b8860b; border-radius:10px;"><br><br><button onclick="document.getElementById('temp-ios-page').remove(); document.getElementById('page-main').style.display='block';" style="padding:10px 25px; background:#b8860b; color:white; border:none; border-radius:10px; font-weight:bold; cursor:pointer; font-size:18px; font-family:'Sarabun', sans-serif;">ย้อนกลับ</button>`;
            document.body.appendChild(tempPage);
            document.getElementById('page-main').style.display = 'none';
        });
    }

    function loadLotto(f, i) { curF = f; curI = i; document.getElementById('title').textContent = db[f][i].n; showPage('page-main'); genNumbers(); save(); }
    function showPage(p) { document.getElementById('page-menu').style.display = p=='page-menu'?'block':'none'; document.getElementById('page-main').style.display = p=='page-main'?'block':'none'; }
    function moveLotto(d) { curI += d; if(curI < 0) curI = 0; if(curI >= db[curF].length) curI = db[curF].length - 1; loadLotto(curF, curI); }
    function adjustDate(d) { curDate.setDate(curDate.getDate() + d); const s = curDate.toLocaleDateString('th-TH', { day: 'numeric', month: 'short', year: '2-digit' }); document.getElementById('date-label').textContent = s; document.getElementById('date-display').textContent = s; save(); }
    
    function genNumbers() { 
        const r1 = () => Math.floor(Math.random() * 10);
        const r3 = () => "" + r1() + r1() + r1();

        // 1. สุ่มเลขเด่น (เน้น/รอง) ด้านบนก่อนเพื่อใช้เป็นฐานข้อมูลหลัก
        const mainDigit = r1();
        const subDigit = r1();
        document.getElementById('o1').textContent = mainDigit; 
        document.getElementById('o2').textContent = subDigit; 

        // 2. ฟังก์ชันเจาะจงสุ่มเลข 2 ตัว โดยบังคับดึงเลขเน้นหรือเลขรองมาผสม 1 ตัวเสมอ
        const makePair = () => {
            const pool = [mainDigit, subDigit];
            const chosenBase = pool[Math.floor(Math.random() * pool.length)]; // เลือกตัวใดตัวนึงจาก เน้น/รอง
            const randomDigit = r1(); // สุ่มเลขอีกตัวมาประกบ
            
            // สลับตำแหน่งสุ่มหน้า-หลังเพื่อความหลากหลายของตัวเลขไม่ให้ซ้ำแพทเทิร์นเดิม
            return Math.random() > 0.5 ? "" + chosenBase + randomDigit : "" + randomDigit + chosenBase;
        };

        document.getElementById('n1').textContent = makePair(); 
        document.getElementById('n2').textContent = makePair(); 
        document.getElementById('n3').textContent = makePair(); 
        document.getElementById('n4').textContent = makePair(); 

        // 3. สุ่มเลข 3 ตัวอิสระปกติ
        document.getElementById('m1').textContent = r3(); 
        document.getElementById('m2').textContent = r3(); 
        document.getElementById('m3').textContent = r3(); 
        save(); 
    }

    function save() { 
        const s = {}; 
        document.querySelectorAll('.number-box, .lotto-number').forEach(b => { s[b.id] = {x:b.getAttribute('data-x')||0, y:b.getAttribute('data-y')||0, txt:b.textContent}; }); 
        localStorage.setItem('napas_separate', JSON.stringify({s, curF, curI, date:curDate, scale:currentScale})); 
    }
    
    function load() { 
        const d = JSON.parse(localStorage.getItem('napas_separate')); 
        if(d) { 
            curF = d.curF; curI = d.curI; curDate = new Date(d.date); currentScale = d.scale || 100; 
            document.getElementById('fontSizeSlider').value = currentScale; changeFontSize(currentScale); 
            Object.keys(d.s).forEach(id => { const el=document.getElementById(id); if(el) { el.textContent=d.s[id].txt; el.style.transform=`translate(${d.s[id].x}px, ${d.s[id].y}px)`; el.setAttribute('data-x', d.s[id].x); el.setAttribute('data-y', d.s[id].y); } }); 
            adjustDate(0); 
        } 
    }
    
    function toggleLock() { isLocked = !isLocked; document.getElementById('lock-btn').textContent = isLocked ? "🔒 ล็อคแล้ว" : "🔓 ปลดล็อค"; document.getElementById('size-panel').style.display = isLocked ? "none" : "block"; }
    function resetAll() { localStorage.removeItem('napas_separate'); location.reload(); }
    function filterLottery(q) { document.querySelectorAll('.btn-lotto').forEach(b => b.style.display = b.textContent.toLowerCase().includes(q.toLowerCase()) ? "block" : "none"); }
    
    interact('.number-box, .lotto-number').draggable({ listeners: { move(e) { if(!isLocked) { const t=e.target; const x=(parseFloat(t.getAttribute('data-x'))||0)+e.dx; const y=(parseFloat(t.getAttribute('data-y'))||0)+e.dy; t.style.transform=`translate(${x}px, ${y}px)`; t.setAttribute('data-x', x); t.setAttribute('data-y', y); save(); } } } });
    
    Object.keys(db).forEach(f => { let b=document.createElement('button'); b.className='btn-folder'; b.textContent=f; let l=document.createElement('div'); l.className='lottery-list'; b.onclick = () => { document.querySelectorAll('.lottery-list').forEach(i => { if(i !== l) i.classList.remove('active'); }); l.classList.toggle('active'); }; db[f].forEach((item,i) => { let s=document.createElement('button'); s.className='btn-lotto'; let img = document.createElement('img'); img.src = `https://flagcdn.com/w20/${item.f}.png`; img.style.borderRadius="2px"; s.appendChild(img); s.append(item.n); s.onclick=(e)=>{e.stopPropagation(); loadLotto(f,i)}; l.appendChild(s); }); document.getElementById('menu').appendChild(b); document.getElementById('menu').appendChild(l); });
    window.onload = () => { load(); curDate = new Date(); adjustDate(0); };
</script>
</body>
</html>
